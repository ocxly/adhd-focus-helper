<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Brown Noise</title><link href='https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap' rel='stylesheet'><style>body{font-family:Lexend,sans-serif;text-align:center;background:#0f172a;color:white;padding:40px}button,input{padding:12px;margin:10px}</style></head><body><h1>🟤 Brown Noise Generator</h1><p>Some people find brown noise calmer and less sharp than white noise.</p><button onclick='startNoise()'>Start</button><button onclick='stopNoise()'>Stop</button><br><input type='range' min='0' max='1' step='0.01' value='0.2' id='vol'><script>let ctx,node,gain;function startNoise(){ctx=new(window.AudioContext||window.webkitAudioContext)();const buffer=ctx.createBuffer(1,ctx.sampleRate*2,ctx.sampleRate);const data=buffer.getChannelData(0);let last=0;for(let i=0;i<data.length;i++){const white=Math.random()*2-1;data[i]=(last+0.02*white)/1.02;last=data[i];data[i]*=3.5;}node=ctx.createBufferSource();node.buffer=buffer;node.loop=true;gain=ctx.createGain();gain.gain.value=vol.value;node.connect(gain);gain.connect(ctx.destination);node.start();vol.oninput=()=>gain.gain.value=vol.value;}function stopNoise(){if(node)node.stop();}</script></body></html>
