<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Executive Function Assistant</title><link href='https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap' rel='stylesheet'><style>body{font-family:Lexend,sans-serif;max-width:900px;margin:auto;padding:20px;background:#0f172a;color:#fff}select,button{padding:12px;margin:8px;width:100%;max-width:400px}.card{background:#1e293b;padding:16px;border-radius:12px;margin-top:20px}</style></head><body><h1>⚡ Executive Function Assistant</h1><p>Check in with your energy, stress, and available time.</p><select id='energy'><option>Low</option><option>Medium</option><option>High</option></select><select id='stress'><option>High</option><option>Medium</option><option>Low</option></select><select id='time'><option>5</option><option>15</option><option>30</option><option>60+</option></select><button onclick='recommend()'>Get Recommendation</button><button onclick='overwhelmed()'>🚨 I'm Overwhelmed</button><div id='result' class='card'>Your recommendations will appear here.</div><script>function recommend(){const e=energy.value,s=stress.value,t=time.value;let msg='';if(e==='Low'&&s==='High'){msg='🧘 Grounding Tool → 🟤 Brown Noise → One Tiny Task → 10 Minute Sprint';}else if(e==='High'){msg='⏰ Pomodoro Pro → Pick Most Important Task → Focus Session';}else{msg='🧩 Task Chunker → 15 Minute Focus Block → Reward Afterwards';}result.innerHTML='<h3>Suggested Plan</h3><p>'+msg+'</p><p>Available Time: '+t+' minutes</p>';}function overwhelmed(){result.innerHTML='<h3>Overwhelm Mode</h3><ol><li>Drink water</li><li>Take 3 slow breaths</li><li>Choose one tiny action</li><li>Ignore everything else</li><li>Start for 2 minutes</li></ol>';}</script></body></html>
