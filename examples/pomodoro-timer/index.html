<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>ADHD Pomodoro Pro</title><link href='https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap' rel='stylesheet'><style>body{font-family:Lexend,sans-serif;text-align:center;background:#0f172a;color:white;padding:20px}#time{font-size:5rem;margin:20px}button,input{padding:12px;margin:6px;border-radius:8px}input{width:90px}#stats{margin-top:20px;padding:15px;background:#1e293b;border-radius:12px}</style></head><body><h1>⏰ ADHD Pomodoro Pro</h1><p>Task for this session</p><input id='task' placeholder='One small task'><br><input id='work' type='number' value='25'> Work <input id='break' type='number' value='5'> Break<br><div id='time'>25:00</div><button onclick='startTimer()'>Start</button><button onclick='pauseTimer()'>Pause</button><button onclick='resetTimer()'>Reset</button><button onclick='twoMinuteStart()'>2-Minute Start</button><div id='stats'></div><script>let s=1500,i,sessions=+localStorage.sessions||0;function render(){let m=Math.floor(s/60),ss=s%60;time.textContent=m+':'+String(ss).padStart(2,'0');stats.innerHTML='Completed Sessions Today: '+sessions;}function startTimer(){clearInterval(i);i=setInterval(()=>{if(s>0){s--;render()}else{sessions++;localStorage.sessions=sessions;alert('Session Complete!');clearInterval(i);render();}},1000)}function pauseTimer(){clearInterval(i)}function resetTimer(){clearInterval(i);s=(+work.value||25)*60;render()}function twoMinuteStart(){clearInterval(i);s=120;render();startTimer()}resetTimer();</script></body></html>
