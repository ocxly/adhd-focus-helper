<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Pomodoro Timer</title><link href='https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap' rel='stylesheet'><style>body{font-family:Lexend,sans-serif;text-align:center;background:#0f172a;color:white;padding:40px}#time{font-size:5rem;margin:20px}button{padding:12px 20px;margin:5px;font-size:1rem}</style></head><body><h1>⏰ ADHD-Friendly Pomodoro</h1><div id='time'>25:00</div><button onclick='startTimer()'>Start</button><button onclick='pauseTimer()'>Pause</button><button onclick='resetTimer()'>Reset</button><script>let s=1500,i;function render(){let m=Math.floor(s/60),ss=s%60;time.textContent=m+':'+String(ss).padStart(2,'0')}function startTimer(){clearInterval(i);i=setInterval(()=>{if(s>0){s--;render()}},1000)}function pauseTimer(){clearInterval(i)}function resetTimer(){clearInterval(i);s=1500;render()}render();</script></body></html>
