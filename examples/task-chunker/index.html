<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Task Chunker</title><link href='https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap' rel='stylesheet'><style>body{font-family:Lexend,sans-serif;max-width:800px;margin:auto;padding:20px;background:#0f172a;color:white}textarea,button{width:100%;padding:12px;margin:8px 0}li{margin:8px 0}</style></head><body><h1>🧩 ADHD Task Chunker</h1><p>Paste a large task and break it into smaller actions.</p><textarea id='task' rows='4' placeholder='Example: Build a website'></textarea><button onclick='chunk()'>Break Into Steps</button><ul id='out'></ul><script>function chunk(){const t=task.value.trim();out.innerHTML='';['Define goal','Gather materials','Create first tiny step','Work for 10 minutes','Review progress','Finish next step'].forEach(x=>{let li=document.createElement('li');li.textContent=t+' → '+x;out.appendChild(li);});}</script></body></html>
