<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>White Noise Generator</title><link href='https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap' rel='stylesheet'><style>body{font-family:Lexend,sans-serif;text-align:center;background:#0f172a;color:white;padding:40px}button,input{padding:12px;margin:10px}</style></head><body><h1>🌧️ White Noise Generator</h1><p>Generate focus-friendly background noise directly in your browser.</p><button onclick='startNoise()'>Start Noise</button><button onclick='stopNoise()'>Stop Noise</button><br><input type='range' min='0' max='1' step='0.01' value='0.2' id='vol'><script>let ctx,node,gain;function startNoise(){ctx=new(window.AudioContext||window.webkitAudioContext)();const buffer=ctx.createBuffer(1,ctx.sampleRate*2,ctx.sampleRate);const data=buffer.getChannelData(0);for(let i=0;i<data.length;i++){data[i]=Math.random()*2-1;}node=ctx.createBufferSource();node.buffer=buffer;node.loop=true;gain=ctx.createGain();gain.gain.value=vol.value;node.connect(gain);gain.connect(ctx.destination);node.start();vol.oninput=()=>gain.gain.value=vol.value;}function stopNoise(){if(node)node.stop();}</script></body></html>
